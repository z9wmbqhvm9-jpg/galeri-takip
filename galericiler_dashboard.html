        // Galeri için bugünkü kontrolü kaydeden fonksiyon

            const tarihStr = bugun.getFullYear() + '-' + (bugun.getMonth()+1).toString().padStart(2,'0') + '-' + bugun.getDate().toString().padStart(2,'0');
            if (!gecmis.includes(tarihStr)) {
                gecmis.push(tarihStr);

            renderGaleriler(galeriler);

    function getTodayKey() {
        const d = new Date();
        return 'galeriKontrol_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
    }
    function getKontrolDurum() {
        const key = getTodayKey();
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : {};
    }
    function setKontrolDurum(obj) {
        const key = getTodayKey();
        localStorage.setItem(key, JSON.stringify(obj));
    }
    function renderGaleriler(list) {
        const galeriListesi = document.getElementById('galeriListesi');
        const kontrolDurum = getKontrolDurum();
        galeriListesi.innerHTML = '';
        list.forEach(function(galeri, idx) {
            // Bugün kontrol edildi mi?
            const key = 'kontrolGecmisi_' + galeri;
            let gecmis = JSON.parse(localStorage.getItem(key) || '[]');
            const bugun = new Date();
            const tarihStr = bugun.getFullYear() + '-' + (bugun.getMonth()+1).toString().padStart(2,'0') + '-' + bugun.getDate().toString().padStart(2,'0');
            const bugunKontrol = gecmis.includes(tarihStr);
            galeriListesi.innerHTML += `

                            <span>
                                ${bugunKontrol
                                    ? '<span style="color:#28a745;font-weight:bold;font-size:1.2em;">&#10003; Kontrol Edildi</span>'
                                    : '<span style="color:#dc3545;font-weight:bold;font-size:1.1em;">&#10007; Kontrol Edilmedi</span>'}
                            </span>
                        </div>
                        <div class="d-flex flex-column gap-2 mt-auto">
                            <button class="btn btn-success btn-sm w-100" onclick="event.stopPropagation();kontrolKaydet('${galeri.replace(/'/g, "\\'")}')">Bugün Kontrol Et</button>
                            <div class="mt-2" id="istatistik_${idx}"></div>

            setTimeout(() => guncelleIstatistik(galeri, idx), 0);
        });
    }

            // cars_data.json dosyasını oku

            // Normalize fonksiyonu: harfleri küçült, Türkçe karakterleri düzelt, boşluk ve özel karakterleri kaldır
            function normalize(str) {

                const map = {

                };
                let out = '';
                for (let i = 0; i < str.length; i++) {
                    let c = str[i];
                    out += map[c] !== undefined ? map[c] : c;
                }
                return out.toLocaleLowerCase('tr-TR').replace(/[^a-z0-9]/g, '');
            }
            // Levenshtein mesafesi ile en yakın galeri bulucu
            function levenshtein(a, b) {
                const an = a.length, bn = b.length;
                if (an === 0) return bn;
                if (bn === 0) return an;
                let matrix = [];
                for (let i = 0; i <= bn; i++) matrix[i] = [i];
                for (let j = 0; j <= an; j++) matrix[0][j] = j;
                for (let i = 1; i <= bn; i++) {
                    for (let j = 1; j <= an; j++) {
                        if (b.charAt(i - 1) === a.charAt(j - 1)) {
                            matrix[i][j] = matrix[i - 1][j - 1];
                        } else {
                            matrix[i][j] = Math.min(
                                matrix[i - 1][j - 1] + 1,
                                Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1)
                            );
                        }
                    }
                }
                return matrix[bn][an];
            }
            // galeriNorms zaten yukarıda tanımlandı
            const galeriNorm = normalize(galeri);
            const galeriNorms = galeriler.map(normalize);
            function findClosestGaleriNorm(sellerName) {
                const norm = normalize(sellerName);
                let idx = galeriNorms.indexOf(norm);
                if (idx !== -1) return galeriNorms[idx];
                // En uzun ortak substring ile en yakın galeri bul
                let maxMatch = 0, bestIdx = -1;
                for (let i = 0; i < galeriNorms.length; i++) {
                    let match = 0;
                    for (let j = 0; j < Math.min(norm.length, galeriNorms[i].length); j++) {
                        if (norm[j] === galeriNorms[i][j]) match++;
                        else break;
                    }
                    if (match > maxMatch) { maxMatch = match; bestIdx = i; }
                }
                if (maxMatch >= 6) return galeriNorms[bestIdx]; // 6 harf ve üzeri ortaklık varsa ata
                return null;
            }
            let ilanlar = data.vehicles.filter(v => {
                if (!(v.seller && v.seller.name)) return galeri === 'Diğer';
                const sellerNorm = normalize(v.seller.name);
                const closest = findClosestGaleriNorm(v.seller.name);
                if (galeri === 'Diğer') {
                    return !closest || closest !== galeriNorm;
                }
                return closest === galeriNorm;
            }).filter(v => v.status === 'active' || v.status === 'sold');

            const ortFiyat = toplamSatis > 0 ? (ilanlar.reduce((a,b)=>a+b.price,0)/toplamSatis).toLocaleString('tr-TR', {maximumFractionDigits:0}) + ' TL' : '-';

                            </tbody>

                    </div>
                </div>
                <div class="col-md-5">
                    <h5 class="mb-2">İletişim</h5>
                    <ul class="list-group mb-3">
                        <li class="list-group-item"><b>Yetkili:</b> ${iletisim.yetkili}</li>
                        <li class="list-group-item"><b>Telefon:</b> ${iletisim.tel}</li>
                        <li class="list-group-item"><b>Email:</b> ${iletisim.mail}</li>

                    <ul class="list-group">
                        <li class="list-group-item"><b>Toplam Araç:</b> ${toplamSatis}</li>
                        <li class="list-group-item"><b>Ortalama Fiyat:</b> ${ortFiyat}</li>
                    </ul>
                </div>
            </div>`;
            document.getElementById('galeriDetayBody').innerHTML = html;
            var modal = new bootstrap.Modal(document.getElementById('galeriDetayModal'));
            modal.show();
        }

        // 1. Tam normalize eşleşme
        let filtered = galeriler.filter(galeri => normalize(galeri) === qNorm);
        // 2. Parça eşleşme (her kelime galeri adında geçmeli)
        if(filtered.length === 0) {
            const kelimeler = q.split(/\s+/).filter(Boolean);
            filtered = galeriler.filter(galeri => {
                const galeriLower = galeri.toLowerCase();
                return kelimeler.every(kelime => galeriLower.includes(kelime));
            });
        }
        // 3. Normalize parça eşleşme (her kelime normalize edilmiş galeri adında geçmeli)
        if(filtered.length === 0) {
            const kelimeler = q.split(/\s+/).filter(Boolean).map(normalize);

                return kelimeler.every(kelime => galeriNorm.includes(kelime));

    // İstatistik özetini hesapla ve göster
    function istatistikOzetGuncelle() {
        // Toplam kontrol sayısı
        let toplamKontrol = 0;
        let gunlukKontrol = {};
        let galeriSkorList = [];
        const bugun = new Date();
        for(const galeri of galeriler) {
            const key = 'kontrolGecmisi_' + galeri;
            let gecmis = JSON.parse(localStorage.getItem(key) || '[]');
            toplamKontrol += gecmis.length;
            // Son 7 gün için skor
            let sayac = 0;
            for(let i=6; i>=0; i--) {
                let d = new Date(bugun);
                d.setDate(bugun.getDate()-i);
                const tarihStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
                if(gecmis.includes(tarihStr)) {
                    sayac++;
                    gunlukKontrol[tarihStr] = (gunlukKontrol[tarihStr]||0)+1;
                }
            }
            galeriSkorList.push({galeri, skor:sayac});
        }
        // Galeri bazlı sıralama (en çok kontrol edilenler)
        galeriSkorList.sort((a,b)=>b.skor-a.skor);
        // Günlük grafik (son 7 gün)
        let gunler = [];
        let gunlerLabel = [];
        for(let i=6; i>=0; i--) {
            let d = new Date(bugun);
            d.setDate(bugun.getDate()-i);
            const tarihStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
            gunler.push(gunlukKontrol[tarihStr]||0);
            gunlerLabel.push((d.getMonth()+1)+'.'+d.getDate());
        }
        // HTML oluştur
        let html = `<div class="row g-2">
            <div class="col-12 col-md-4">
                <div class="card p-3 mb-2">
                    <div class="fw-bold">Toplam Kontrol</div>

                    <div style="height:60px; display:flex; align-items:end; gap:2px;">

                    <div class="d-flex justify-content-between" style="font-size:11px; color:#888;">
                        ${gunlerLabel.map(l=>`<span>${l}</span>`).join('')}
                    </div>
                </div>
            </div>

                </div>
            </div>
        </div>`;
        document.getElementById('istatistikOzet').innerHTML = html;
    }
